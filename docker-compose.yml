services:
  postgres:
    image: postgres:16-alpine
    container_name: aibios_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aibios_admin
      POSTGRES_PASSWORD: aibios_secure_password_2026
      POSTGRES_DB: aibios_db
    ports:
      - "5432:5432"
    volumes:
      - aibios_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibios_admin -d aibios_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: aibios_mongo
    restart: unless-stopped
    # Host port 27018 (not 27017): this machine already runs a native, unrelated
    # MongoDB on 27017 which otherwise silently intercepts "localhost:27017".
    ports:
      - "27018:27017"
    volumes:
      - aibios_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aibios_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aibios_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aibios_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - aibios_qdrant_data:/qdrant/storage

volumes:
  aibios_postgres_data:
  aibios_mongo_data:
  aibios_redis_data:
  aibios_qdrant_data:
