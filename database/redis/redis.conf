# AI-BOS Redis Custom Configuration
# Target: Redis 7.0+

# Networking & Ports
port 6379
timeout 0
tcp-keepalive 300

# Security (Uncomment inside production environments)
# requirepass your_strong_pass_here

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence Options
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Monitoring
notify-keyspace-events "Ex"
